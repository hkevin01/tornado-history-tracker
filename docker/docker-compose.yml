services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tornado-history-tracker:latest
    container_name: tornado-tracker
    ports:
      - "8088:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 3
